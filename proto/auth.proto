syntax = "proto3";

package auth;

option go_package = "github.com/fanyicharllson/phonkdrift-backend/pb/auth;authpb";

// The authentication and profile manager service
service AuthService {
  rpc RegisterUser (RegisterRequest) returns (RegisterResponse);
  rpc LoginUser (LoginRequest) returns (LoginResponse);
  rpc ValidateToken (ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc VerifyCode (VerifyRequest) returns (VerifyResponse);
  rpc ResendCode (ResendCodeRequest) returns (ResendCodeResponse);
  rpc GetUser (GetUserRequest) returns (GetUserResponse);
  rpc UpdateProfile (UpdateProfileRequest) returns (UpdateProfileResponse);
  rpc ForgotPassword (ForgotPasswordRequest) returns (ForgotPasswordResponse);
  rpc ResetPassword (ResetPasswordRequest) returns (ResetPasswordResponse);
  rpc VerifyResetCode (VerifyResetCodeRequest) returns (VerifyResetCodeResponse);

  // Admin operations
  rpc BanUser (BanUserRequest) returns (BanUserResponse);
  rpc UnbanUser (UnbanUserRequest) returns (UnbanUserResponse);
  rpc SendPushNotification (PushNotificationRequest) returns (PushNotificationResponse);
  rpc UpdateFCMToken (UpdateFCMTokenRequest) returns (UpdateFCMTokenResponse);

  rpc GetUserStatus (GetUserStatusRequest) returns (GetUserStatusResponse);
}

message RegisterRequest {
  string username = 1;
  string email    = 2;
  string password = 3;
}

message RegisterResponse {
  string user_id = 1;
  string message = 2;
}

message VerifyRequest {
  string email = 1;
  string code  = 2;
}

message VerifyResponse {
  bool   success    = 1;
  string message    = 2;
  string token      = 3;        // Added for auto-login
  int64  expires_at = 4;    // Added for auto-login
  string user_id    = 5;      // Added for auto-login
}

message LoginRequest {
  string email    = 1;
  string password = 2;
}

message LoginResponse {
  string token      = 1;
  string user_id    = 2;
  int64  expires_at = 3;
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool   is_valid = 1;
  string user_id  = 2;
  string username = 3;
  User   user     = 4;
}

// Added for ResendCode
message ResendCodeRequest {
  string email = 1;
}

message ResendCodeResponse {
  bool   success = 1;
  string message = 2;
}

// Added for GetUser
message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  User user = 1;
}

message UpdateProfileRequest {
  string user_id     = 1;
  string phonk_level = 2;
}

message UpdateProfileResponse {
  bool success = 1;
  User user    = 2;
}

message User {
  string user_id     = 1;
  string username    = 2;
  string email       = 3;
  string avatar_url  = 4;
  string phonk_level = 5;
  bool   is_banned   = 6;
}

message ForgotPasswordRequest {
  string email = 1;
}

message ForgotPasswordResponse {
  bool   success = 1;
  string message = 2;
}

message ResetPasswordRequest {
  string email        = 1;
  string code         = 2;
  string new_password = 3;
}

message ResetPasswordResponse {
  bool   success = 1;
  string message = 2;
}
message VerifyResetCodeRequest {
    string email = 1;
    string code = 2;
}

message VerifyResetCodeResponse {
    bool success = 1;
    string reset_token = 2; // Short-lived token purely for password updating
}

//  — Admin Ban System
message BanUserRequest {
  string user_id = 1;
  string reason  = 2;
}
message BanUserResponse {
  bool   success = 1;
  string message = 2;
}
message UnbanUserRequest {
  string user_id = 1;
}
message UnbanUserResponse {
  bool   success = 1;
  string message = 2;
}

//  — FCM Push Notifications
message PushNotificationRequest {
  string title          = 1;
  string body           = 2;
  string target_user_id = 3; // empty = broadcast to all
  string data_type      = 4; // "trending", "new_track", "chat", etc.
  string data_id        = 5; // ID to navigate to on tap
}
message PushNotificationResponse {
  bool   success       = 1;
  int32  sent_count    = 2;
  string message       = 3;
}

//  FCM Token Registration (called from Flutter on login)
message UpdateFCMTokenRequest {
  string user_id   = 1;
  string fcm_token = 2;
}
message UpdateFCMTokenResponse {
  bool success = 1;
}

message GetUserStatusRequest {
  string user_id = 1;
}

message GetUserStatusResponse {
  bool   is_banned   = 1;
  string ban_reason  = 2;
  string username    = 3;
  string phonk_level = 4;
}